name: Generate Index

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Generate Index JSON
        run: |
          python3 - <<'EOF'
          import os
          import json

          folders = ["isp", "rsa", "testpoint"]
          data = []

          for folder in folders:
              if not os.path.exists(folder):
                  continue

              for file in os.listdir(folder):

                  if not file.lower().endswith((".jpg",".jpeg",".png",".webp")):
                      continue

                  name = os.path.splitext(file)[0]

                  parts = [x.strip() for x in name.split("_") if x.strip()]

                  title = parts[0]

                  keywords = []

                  for p in parts:
                      keywords.append(p.lower())

                  data.append({
                      "folder": folder,
                      "filename": file,
                      "name": title,
                      "keywords": keywords
                  })

          with open("index.json","w",encoding="utf8") as f:
              json.dump(data,f,ensure_ascii=False,indent=2)
          EOF

      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add index.json
          git commit -m "Update index.json" || exit 0
          git push
