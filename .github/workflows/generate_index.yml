name: Generate Index

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.json
        run: |
          python3 << 'EOF'
          import os
          import json

          folders = ["isp", "rsa", "testpoint"]
          data = []

          for folder in folders:
              if not os.path.exists(folder):
                  continue

              for file in os.listdir(folder):

                  if not file.lower().endswith((".jpg", ".jpeg", ".png", ".webp")):
                      continue

                  filename = os.path.splitext(file)[0]

                  parts = filename.split("__")

                  brand = parts[0].strip() if len(parts) > 0 else ""
                  model = parts[1].strip() if len(parts) > 1 else ""
                  code = parts[2].strip() if len(parts) > 2 else ""

                  keywords = [
                      brand.lower(),
                      model.lower(),
                      code.lower(),
                      f"{brand} {model}".lower(),
                      f"{model} {code}".lower()
                  ]

                  data.append({
                      "folder": folder,
                      "filename": file,
                      "brand": brand,
                      "model": model,
                      "code": code,
                      "keywords": list(set(filter(None, keywords)))
                  })

          with open("index.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          EOF

      - name: Commit index.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.json

          git diff --cached --quiet || git commit -m "Update index.json"

          git push
